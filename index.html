<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f56a;
      --text: #f0ede6;
      --muted: #888;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 90px 20px 80px;
    }

    /* Subtle background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; width: 100%; max-width: 640px; }

    /* ── Header / Hero ── */
    .hero {
      display: flex;
      align-items: flex-start;
      gap: 28px;
      margin-bottom: 40px;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8f56a 0%, #6af5c8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #0e0e0e;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .status-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 12px;
      height: 12px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid var(--bg);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    }

    .hero-text { padding-top: 6px; }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .title {
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 500;
      margin: 8px 0 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .location {
      color: var(--muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 16px;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.1s; }
    .card:nth-child(4) { animation-delay: 0.15s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 500;
    }

    /* ── Bio ── */
    .bio {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #ccc;
      font-weight: 300;
    }

    .bio strong { color: var(--text); font-weight: 500; }

    /* ── Skills ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 13px;
      font-size: 0.82rem;
      color: #bbb;
      transition: border-color 0.2s, color 0.2s;
      cursor: default;
    }

    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Currently ── */
    .currently-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .currently-list li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: 0.9rem;
      color: #bbb;
      line-height: 1.5;
    }

    .currently-list li .icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #222;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* ── Links ── */
    .links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .link-btn:hover {
      border-color: var(--accent);
      background: #1e1e1e;
      transform: translateY(-1px);
    }

    .link-btn .licon { font-size: 18px; }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      background: rgba(22, 22, 22, 0.85);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px;
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-btn {
      padding: 7px 18px;
      border-radius: 99px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .nav-btn:hover { color: var(--text); }

    .nav-btn.active {
      background: var(--accent);
      color: #0e0e0e;
    }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--muted);
      text-align: center;
      gap: 12px;
    }

    .empty-state .empty-icon { font-size: 2.5rem; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 36px;
    }

    .footer span { color: var(--accent); }
  </style>
</head>
<body>

  <script>
    function showPage(id, btn) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
  </script>
